<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Registration Form</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h2, h3 {
            margin-top: 0;
            color: #222;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .section-header {
            background: #f0f4f8;
            padding: 10px;
            border-radius: 4px;
            margin-top: 25px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-header input[type="checkbox"] {
            transform: scale(1.2);
        }

        .schedule-grid {
            display: none; 
            grid-template-columns: 1fr 2fr;
            gap: 10px;
            padding-left: 10px;
        }

        .day-row {
            display: contents;
        }

        .day-label {
            font-weight: 500;
            align-self: center;
            text-transform: capitalize;
        }

        .time-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .time-inputs input[type="time"] {
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .church-container {
            display: none;
            padding-left: 10px;
        }

        /* Styling for the Department checklist grid */
        .dept-selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .dept-checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #eef2f7;
            padding: 10px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
        }

        .dept-schedule-block {
            display: none;
            background: #fafafa;
            border-left: 4px solid var(--primary-color);
            padding: 15px;
            border-radius: 0 4px 4px 0;
            margin-bottom: 15px;
        }

        .church-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .church-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #ffffff;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
            cursor: pointer;
        }

        .show-section {
            display: grid !important;
        }
        
        .show-block {
            display: block !important;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        .output-box {
            display: none;
            background: #eef9f1;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 700px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Schedule Registration</h2>
    <form id="scheduleForm">
        
        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" id="name" required placeholder="Jay Cris Mangasar">
        </div>

        <div class="section-header">
            <input type="checkbox" id="enable_work" onchange="toggleSection('work_section', this)">
            <label for="enable_work" style="margin:0;">Schedule for Work</label>
        </div>
        <div id="work_section" class="schedule-grid"></div>

        <div class="section-header">
            <input type="checkbox" id="enable_school" onchange="toggleSection('school_section', this)">
            <label for="enable_school" style="margin:0;">Schedule for School</label>
        </div>
        <div id="school_section" class="schedule-grid"></div>

        <div class="section-header">
            <input type="checkbox" id="enable_church" onchange="toggleChurchSection(this)">
            <label for="enable_church" style="margin:0;">Schedule for Church Office</label>
        </div>
        
        <div id="church_section" class="church-container">
            <label>Choose your Kagawaran / Department (Select all that apply):</label>
            
            <div class="dept-selection-grid">
                <label class="dept-checkbox-item"><input type="checkbox" class="dept-trigger" value="PNK-MT" onchange="toggleDeptSchedule(this)"> PNK (MT)</label>
                <label class="dept-checkbox-item"><input type="checkbox" class="dept-trigger" value="FINANCE" onchange="toggleDeptSchedule(this)"> FINANCE</label>
                <label class="dept-checkbox-item"><input type="checkbox" class="dept-trigger" value="MANG-AAWIT" onchange="toggleDeptSchedule(this)"> MANG-AAWIT</label>
                <label class="dept-checkbox-item"><input type="checkbox" class="dept-trigger" value="SCAN" onchange="toggleDeptSchedule(this)"> SCAN</label>
                <label class="dept-checkbox-item"><input type="checkbox" class="dept-trigger" value="DIAKONO-DIAKONESA" onchange="toggleDeptSchedule(this)"> DIAKONO/DIAKONESA</label>
                <label class="dept-checkbox-item"><input type="checkbox" class="dept-trigger" value="KALIHIM" onchange="toggleDeptSchedule(this)"> KALIHIM</label>
            </div>
            
            <div id="dynamic_church_schedules"></div>
        </div>

        <button type="submit">Submit Schedule</button>
    </form>
</div>

<div id="outputContainer" class="output-box"></div>

<script>
const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
const churchSlots = [
    "Wed 5am", "Wed 5pm", "Wed 8pm", "Thu 5am", "Thu 5pm", "Thu 8pm",
    "Sat 6am", "Sat 10am (Laan)", "Sat 2pm", "Sat 6pm", "Sun 6am", "Sun 10am", "Sun 2pm"
];

// Paste your live Cloudflare Worker URL here
const WORKER_URL = "https://schedule-api.jakemm04.workers.dev"; 

window.addEventListener('DOMContentLoaded', () => {
    generateDayInputs('work_section', 'work');
    generateDayInputs('school_section', 'school');
    buildChurchSchedulesHTML();
});

function generateDayInputs(containerId, prefix) {
    const container = document.getElementById(containerId);
    let html = '';
    days.forEach(day => {
        const capitalizedDay = day.charAt(0).toUpperCase() + day.slice(1);
        html += `
            <div class="day-row">
                <span class="day-label">${capitalizedDay}:</span>
                <div class="time-inputs">
                    <label>In: <input type="time" class="${prefix}-in" data-day="${day}"></label>
                    <label>Out: <input type="time" class="${prefix}-out" data-day="${day}"></label>
                </div>
            </div>`;
    });
    container.innerHTML = html;
}

// Pre-builds separate time blocks for every single department hidden out of view
function buildChurchSchedulesHTML() {
    const container = document.getElementById('dynamic_church_schedules');
    const departments = ["PNK-MT", "FINANCE", "MANG-AAWIT", "SCAN", "DIAKONO-DIAKONESA", "KALIHIM"];
    let mainHtml = '';
    
    departments.forEach(dept => {
        let slotsHtml = '';
        churchSlots.forEach(slot => {
            slotsHtml += `
                <label class="church-item">
                    <input type="checkbox" class="church-slot" data-dept="${dept}" value="${slot}">
                    <span>${slot}</span>
                </label>`;
        });
        
        mainHtml += `
            <div id="schedule_block_${dept}" class="dept-schedule-block">
                <strong>Schedule for ${dept.replace('-', '/')}</strong>
                <div class="church-grid">${slotsHtml}</div>
            </div>`;
    });
    container.innerHTML = mainHtml;
}

function toggleSection(sectionId, checkbox) {
    const section = document.getElementById(sectionId);
    section.classList.toggle('show-section', checkbox.checked);
}

function toggleChurchSection(checkbox) {
    const section = document.getElementById('church_section');
    section.classList.toggle('show-block', checkbox.checked);
    if(!checkbox.checked) {
        // Clear all nested selections if the top category is turned off
        document.querySelectorAll('.dept-trigger').forEach(cb => { cb.checked = false; });
        document.querySelectorAll('.dept-schedule-block').forEach(div => { div.style.display = 'none'; });
        document.querySelectorAll('.church-slot').forEach(cb => { cb.checked = false; });
    }
}

// Shows or hides specific time slots based on individual department triggers
function toggleDeptSchedule(checkbox) {
    const block = document.getElementById(`schedule_block_${checkbox.value}`);
    if(checkbox.checked) {
        block.style.display = 'block';
    } else {
        block.style.display = 'none';
        // Clear checkboxes inside this section if unchecked
        document.querySelectorAll(`.church-slot[data-dept="${checkbox.value}"]`).forEach(cb => { cb.checked = false; });
    }
}

document.getElementById('scheduleForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const name = document.getElementById('name').value;
    const isWorkEnabled = document.getElementById('enable_work').checked;
    const isSchoolEnabled = document.getElementById('enable_school').checked;
    const isChurchEnabled = document.getElementById('enable_church').checked;
    
    let payloadItems = [];

    if (isWorkEnabled) {
        days.forEach(day => {
            const timeIn = document.querySelector(`.work-in[data-day="${day}"]`).value;
            const timeOut = document.querySelector(`.work-out[data-day="${day}"]`).value;
            if (timeIn || timeOut) {
                payloadItems.push({ type: 'work', day_or_slot: day, time_in: timeIn, time_out: timeOut });
            }
        });
    }

    if (isSchoolEnabled) {
        days.forEach(day => {
            const timeIn = document.querySelector(`.school-in[data-day="${day}"]`).value;
            const timeOut = document.querySelector(`.school-out[data-day="${day}"]`).value;
            if (timeIn || timeOut) {
                payloadItems.push({ type: 'school', day_or_slot: day, time_in: timeIn, time_out: timeOut });
            }
        });
    }

    if (isChurchEnabled) {
        const activeDepts = Array.from(document.querySelectorAll('.dept-trigger:checked')).map(el => el.value);
        
        if (activeDepts.length === 0) {
            alert("Please check at least one Kagawaran/Department under Church Office.");
            return;
        }

        activeDepts.forEach(dept => {
            const checkedSlots = Array.from(document.querySelectorAll(`.church-slot[data-dept="${dept}"]:checked`)).map(el => el.value);
            checkedSlots.forEach(slot => {
                payloadItems.push({ 
                    type: `church: ${dept.replace('-', '/')}`, 
                    day_or_slot: slot, 
                    time_in: '', 
                    time_out: '' 
                });
            });
        });
    }

    if (payloadItems.length === 0) {
        alert("Please select at least one schedule option before submitting.");
        return;
    }

    const outputContainer = document.getElementById('outputContainer');
    try {
        outputContainer.style.display = 'block';
        outputContainer.innerHTML = "Saving schedule rows to D1 database...";

        const response = await fetch(`${WORKER_URL}/api/submit`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, items: payloadItems })
        });

        const result = await response.json();

        if (response.ok) {
            outputContainer.innerHTML = `<h3>Success!</h3><p>Thank you, ${name}. Your specific duty entries have been saved.
            <br>If you want to update your schedule, kindly contact the Administrator (tsv lead).
            <br>If want to add the another schedule, make sure the name format you input was the same to your last entry of schedules. </p>`;
            document.getElementById('scheduleForm').reset();
            
            // Clean interface collapse
            document.getElementById('work_section').classList.remove('show-section');
            document.getElementById('school_section').classList.remove('show-section');
            document.getElementById('church_section').classList.remove('show-block');
            document.querySelectorAll('.dept-schedule-block').forEach(div => { div.style.display = 'none'; });
        } else {
            throw new Error(result.error || "Failed to save schedule.");
        }
    } catch (error) {
        outputContainer.innerHTML = `<h3 style="color:red;">Error</h3><p>${error.message}</p>`;
    }
});
</script>

</body>
</html>
