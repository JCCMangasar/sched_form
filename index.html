<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Input Form</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h2, h3 {
            margin-top: 0;
            color: #222;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .section-header {
            background: #f0f4f8;
            padding: 10px;
            border-radius: 4px;
            margin-top: 25px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-header input[type="checkbox"] {
            transform: scale(1.2);
        }

        .schedule-grid {
            display: none; 
            grid-template-columns: 1fr 2fr;
            gap: 10px;
            padding-left: 10px;
        }

        .day-row {
            display: contents;
        }

        .day-label {
            font-weight: 500;
            align-self: center;
            text-transform: capitalize;
        }

        .time-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .time-inputs input[type="time"] {
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .church-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            padding: 10px;
        }

        .church-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fafafa;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #eee;
            cursor: pointer;
        }

        .show-section {
            display: grid !important;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }

        .output-box {
            display: none;
            background: #eef9f1;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 700px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Schedule Registration</h2>
    <form id="scheduleForm">
        
        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" id="name" required placeholder="John Doe">
        </div>

        <div class="section-header">
            <input type="checkbox" id="enable_work" onchange="toggleSection('work_section', this)">
            <label for="enable_work" style="margin:0;">Schedule for Work</label>
        </div>
        <div id="work_section" class="schedule-grid"></div>

        <div class="section-header">
            <input type="checkbox" id="enable_school" onchange="toggleSection('school_section', this)">
            <label for="enable_school" style="margin:0;">Schedule for School</label>
        </div>
        <div id="school_section" class="schedule-grid"></div>

        <div class="section-header">
            <input type="checkbox" id="enable_church" onchange="toggleSection('church_section', this)">
            <label for="enable_church" style="margin:0;">Schedule for Church Office</label>
        </div>
        <div id="church_section" class="church-grid"></div>

        <button type="submit">Submit Schedule</button>
    </form>
</div>

<div id="outputContainer" class="output-box"></div>

<script>
const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
const churchSlots = [
    "Wed 5am", "Wed 5pm", "Wed 8pm", "Thu 5am", "Thu 5pm", "Thu 8pm",
    "Sat 6am", "Sat 10am (Laan)", "Sat 2pm", "Sat 6pm", "Sun 6am", "Sun 10am", "Sun 2pm"
];

// Change this to your live Cloudflare Worker URL
const WORKER_URL = "https://schedule-api.jakemm04.workers.dev"; 

window.addEventListener('DOMContentLoaded', () => {
    generateDayInputs('work_section', 'work');
    generateDayInputs('school_section', 'school');
    generateChurchInputs();
});

function generateDayInputs(containerId, prefix) {
    const container = document.getElementById(containerId);
    let html = '';
    days.forEach(day => {
        const capitalizedDay = day.charAt(0).toUpperCase() + day.slice(1);
        html += `
            <div class="day-row">
                <span class="day-label">${capitalizedDay}:</span>
                <div class="time-inputs">
                    <label>In: <input type="time" class="${prefix}-in" data-day="${day}"></label>
                    <label>Out: <input type="time" class="${prefix}-out" data-day="${day}"></label>
                </div>
            </div>`;
    });
    container.innerHTML = html;
}

function generateChurchInputs() {
    const container = document.getElementById('church_section');
    let html = '';
    churchSlots.forEach(slot => {
        html += `
            <label class="church-item">
                <input type="checkbox" class="church-slot" value="${slot}">
                <span>${slot}</span>
            </label>`;
    });
    container.innerHTML = html;
}

function toggleSection(sectionId, checkbox) {
    const section = document.getElementById(sectionId);
    section.classList.toggle('show-section', checkbox.checked);
}

document.getElementById('scheduleForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const name = document.getElementById('name').value;
    const isWorkEnabled = document.getElementById('enable_work').checked;
    const isSchoolEnabled = document.getElementById('enable_school').checked;
    const isChurchEnabled = document.getElementById('enable_church').checked;
    
    // This array collects all active entries to send to D1
    let payloadItems = [];

    if (isWorkEnabled) {
        days.forEach(day => {
            const timeIn = document.querySelector(`.work-in[data-day="${day}"]`).value;
            const timeOut = document.querySelector(`.work-out[data-day="${day}"]`).value;
            if (timeIn || timeOut) {
                payloadItems.push({ type: 'work', day_or_slot: day, time_in: timeIn, time_out: timeOut });
            }
        });
    }

    if (isSchoolEnabled) {
        days.forEach(day => {
            const timeIn = document.querySelector(`.school-in[data-day="${day}"]`).value;
            const timeOut = document.querySelector(`.school-out[data-day="${day}"]`).value;
            if (timeIn || timeOut) {
                payloadItems.push({ type: 'school', day_or_slot: day, time_in: timeIn, time_out: timeOut });
            }
        });
    }

    if (isChurchEnabled) {
        const checkedSlots = Array.from(document.querySelectorAll('.church-slot:checked')).map(el => el.value);
        checkedSlots.forEach(slot => {
            payloadItems.push({ type: 'church', day_or_slot: slot, time_in: '', time_out: '' });
        });
    }

    if (payloadItems.length === 0) {
        alert("Please fill out at least one schedule entry.");
        return;
    }

    // Send the data via Fetch API to your Cloudflare Worker
    const outputContainer = document.getElementById('outputContainer');
    try {
        outputContainer.style.display = 'block';
        outputContainer.innerHTML = "Saving schedule to database...";

        const response = await fetch(`${WORKER_URL}/api/submit`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, items: payloadItems })
        });

        if (response.ok) {
            outputContainer.innerHTML = `<h3>Success!</h3><p>Thank you, ${name}. Your schedule has been saved.</p>`;
            document.getElementById('scheduleForm').reset();
            // Hide custom sections again
            document.getElementById('work_section').classList.remove('show-section');
            document.getElementById('school_section').classList.remove('show-section');
            document.getElementById('church_section').classList.remove('show-section');
        } else {
            throw new Error("Failed to save schedule.");
        }
    } catch (error) {
        outputContainer.innerHTML = `<h3 style="color:red;">Error</h3><p>${error.message}</p>`;
    }
});
</script>

</body>
</html>
