<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suguan (Delegate) Generator - Drag & Drop</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #0284c7;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: #334155;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 360px;
            background: var(--primary);
            color: white;
            padding: 25px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
        }

        .sidebar h2 { margin: 0; font-size: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; color: #f8fafc; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .sidebar label { font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; }
        .sidebar input, .sidebar select { padding: 8px 12px; border: 1px solid #334155; border-radius: 6px; background: #0f172a; color: white; font-size: 14px; }
        .sidebar button { background: var(--accent); color: white; border: none; padding: 10px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; }
        .sidebar button:hover { opacity: 0.9; }

        .managed-slots { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .slot-item { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 6px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .delete-slot-btn { background: transparent; border: none; color: #ef4444; cursor: pointer; font-weight: bold; }

        .main-content { flex: 1; padding: 30px; box-sizing: border-box; overflow-y: auto; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        h1 { margin: 0; color: var(--primary); font-size: 26px; }
        .action-btn { background-color: var(--success); color: white; border: none; padding: 12px 20px; font-weight: bold; font-size: 15px; border-radius: 6px; cursor: pointer; }

        .location-section { margin-bottom: 35px; }
        .location-title { font-size: 18px; color: var(--primary); border-left: 4px solid var(--accent); padding-left: 10px; margin-bottom: 15px; font-weight: bold; }
        .suguan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }

        .suguan-card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 160px;
            transition: all 0.2s;
        }
        .suguan-card.dragover { border-color: var(--success); background: #f0fdf4; }
        .suguan-card.invalid { border-color: var(--danger); animation: shake 0.4s; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25%,75% { transform: translateX(-6px); } }

        .delegate-pill {
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            border-left: 4px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
            user-select: none;
            margin-bottom: 6px;
        }
        .delegate-pill:active { cursor: grabbing; }

        .no-delegates { color: var(--danger); font-size: 13px; font-style: italic; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Manage Schedule Settings</h2>
    <!-- Sidebar controls (same as before) -->
    <div class="form-group">
        <label for="newLocation">Location / Category</label>
        <select id="newLocation">
            <option value="Kapilya">Kapilya (Worship)</option>
            <option value="Abatex Extension">Abatex Extension (Worship)</option>
            <option value="Sitio Laan Extension">Sitio Laan Extension (Worship)</option>
            <option value="Landfill GWS">Landfill GWS (Worship)</option>
            <option value="PNK">PNK (Children's Worship)</option>
            <option value="Other Activities">Other Activities</option>
        </select>
    </div>
    <div class="form-group">
        <label for="newDay">Day of Week</label>
        <select id="newDay">
            <option value="monday">Monday</option>
            <option value="tuesday">Tuesday</option>
            <option value="wednesday">Wednesday</option>
            <option value="thursday">Thursday</option>
            <option value="friday">Friday</option>
            <option value="saturday">Saturday</option>
            <option value="sunday">Sunday</option>
        </select>
    </div>
    <div class="form-group">
        <label>Display Label</label>
        <input type="text" id="newLabel" placeholder="e.g. Sun 2pm">
    </div>
    <div class="form-group">
        <label>Time Slots Boundaries (24H Format)</label>
        <div style="display: flex; gap: 5px;">
            <input type="time" id="newStart" value="05:00" style="flex:1;">
            <input type="time" id="newEnd" value="06:30" style="flex:1;">
        </div>
    </div>
    <div class="form-group">
        <label for="newQuota">Required Personnel Count</label>
        <input type="number" id="newQuota" min="1" max="10" value="3">
    </div>
    <button onclick="addCustomSlot()">➕ Add Time Slot</button>

    <hr style="border: 0; border-top: 1px solid #334155; margin: 15px 0;">
    <h2>Current Database Master Slots</h2>
    <div id="managedSlotsContainer" class="managed-slots"></div>
</div>

<div class="main-content">
    <div class="header-bar">
        <h1>📋 Suguan (Delegates Assignment) - Drag & Drop</h1>
        <button class="action-btn" onclick="generateAssignments()">⚡ Auto-Generate Assignment Matrix</button>
    </div>
    <div id="suguanContainer">
        <div style="text-align:center; padding:120px; color:#94a3b8; font-size:16px;">
            Click "Auto-Generate" then drag names freely.<br>
            <strong>Same-time moves across divisions = Allowed<br>Different overlapping times = Blocked</strong>
        </div>
    </div>
</div>

<script>

const WORKER_URL = "https://schedule-api.jakemm04.workers.dev";
let rawDatabaseRows = [];

let CUSTOM_SCHEDULE_BLOCKS = [ /* your full slot list from the file */ ];

if (localStorage.getItem('custom_suguan_schedule')) {
    CUSTOM_SCHEDULE_BLOCKS = JSON.parse(localStorage.getItem('custom_suguan_schedule'));

// ... [fetchRawData, processProfiles, renderSidebarList, addCustomSlot, deleteCustomSlot, timeToMinutes, shuffleArray, intervalsOverlap] ...

// Main functions (same as previous)
async function fetchRawData() { /* your original code */ }
function processProfiles() { /* your original code */ }
function renderSidebarList() { /* your original code */ }
function addCustomSlot() { /* your original code */ }
function deleteCustomSlot(id) { /* your original code */ }
function timeToMinutes(timeStr) { /* your original code */ }
function shuffleArray(array) { /* your original code */ }
function intervalsOverlap(start1, end1, start2, end2) {
    return start1 < end2 && end2 > start1;
}

// ================== GENERATE + DRAG & DROP ==================
function generateAssignments() {
    Object.values(organizedProfiles).forEach(p => {
        p.currentAssignedCount = 0;
        p.assignedIntervals = [];
    });

    let htmlOutput = "";
    let lockedDeGuzmanPerson = null;
    let currentLocation = "";

    CUSTOM_SCHEDULE_BLOCKS.forEach(slot => {
        if (slot.location !== currentLocation) {
            if (currentLocation) htmlOutput += `</div></div>`;
            currentLocation = slot.location;
            htmlOutput += `<div class="location-section"><div class="location-title">${slot.location} Division</div><div class="suguan-grid">`;
        }

        // Auto-assign logic (same)
        let assignedDelegates = [];
        if (slot.linkedGroup === "deguzman" && lockedDeGuzmanPerson) {
            assignedDelegates = [lockedDeGuzmanPerson];
        } else {
            const slotStartMin = timeToMinutes(slot.start);
            const slotEndMin = timeToMinutes(slot.end);
            const slotStartWithPrepBuffer = slotStartMin - 105;

            let eligibleCandidates = Object.values(organizedProfiles).filter(p => {
                let hasConflict = false;
                for (let c of p.constraints) {
                    if (!c.isChurch && c.day === slot.day) {
                        const workStart = timeToMinutes(c.time_in);
                        const workEnd = timeToMinutes(c.time_out) + 90;
                        if (slotStartWithPrepBuffer < workEnd && slotEndMin > workStart) hasConflict = true;
                    }
                    if (c.isChurch && c.rawSlot === slot.name.toLowerCase()) hasConflict = true;
                }
                if (hasConflict) return false;

                for (let iv of p.assignedIntervals) {
                    if (intervalsOverlap(slotStartMin, slotEndMin, iv.start, iv.end)) return false;
                }
                return true;
            });

            eligibleCandidates = shuffleArray(eligibleCandidates);
            eligibleCandidates.sort((a, b) => a.currentAssignedCount - b.currentAssignedCount);
            assignedDelegates = eligibleCandidates.slice(0, slot.quota);

            if (slot.linkedGroup === "deguzman" && assignedDelegates.length) lockedDeGuzmanPerson = assignedDelegates[0];
        }

        assignedDelegates.forEach(d => {
            d.currentAssignedCount++;
            d.assignedIntervals.push({ start: timeToMinutes(slot.start), end: timeToMinutes(slot.end), slotId: slot.id });
        });

        let delegatesHtml = assignedDelegates.map(d => `
            <div class="delegate-pill" draggable="true" ondragstart="dragStart(event, '${d.name}', ${slot.id})">
                👤 ${d.name} <span style="font-size:10px; opacity:0.6;">#${d.currentAssignedCount}</span>
            </div>
        `).join('');

        htmlOutput += `
            <div class="suguan-card" data-slot-id="${slot.id}" 
                 ondrop="drop(event, ${slot.id})" 
                 ondragover="allowDrop(event)" 
                 ondragleave="dragLeave(event)">
                <div class="time">📍 ${slot.name}</div>
                <div style="font-size:11px; color:#64748b;">Quota: ${slot.quota}</div>
                ${delegatesHtml || '<span class="no-delegates">No delegates assigned</span>'}
            </div>
        `;
    });

    htmlOutput += `</div></div>`;
    document.getElementById('suguanContainer').innerHTML = htmlOutput;
}

function dragStart(e, personName, fromSlotId) {
    e.dataTransfer.setData("personName", personName);
    e.dataTransfer.setData("fromSlotId", fromSlotId);
}

function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
function dragLeave(e) { e.currentTarget.classList.remove('dragover'); }

function drop(e, toSlotId) {
    e.preventDefault();
    const card = e.currentTarget;
    card.classList.remove('dragover');

    const personName = e.dataTransfer.getData("personName");
    const fromSlotId = parseInt(e.dataTransfer.getData("fromSlotId"));
    const person = organizedProfiles[personName];
    const targetSlot = CUSTOM_SCHEDULE_BLOCKS.find(s => s.id === toSlotId);

    if (!person || !targetSlot || fromSlotId === toSlotId) return;

    const newStart = timeToMinutes(targetSlot.start);
    const newEnd = timeToMinutes(targetSlot.end);

    let hasConflict = false;
    for (let iv of person.assignedIntervals) {
        if (iv.slotId !== fromSlotId && intervalsOverlap(newStart, newEnd, iv.start, iv.end)) {
            hasConflict = true;
            break;
        }
    }

    if (hasConflict) {
        card.classList.add('invalid');
        setTimeout(() => card.classList.remove('invalid'), 800);
        alert(`❌ Time conflict! ${personName} cannot be assigned here.`);
        return;
    }

    // Perform the move
    person.assignedIntervals = person.assignedIntervals.filter(iv => iv.slotId !== fromSlotId);
    person.currentAssignedCount = Math.max(0, person.currentAssignedCount - 1);

    person.assignedIntervals.push({ start: newStart, end: newEnd, slotId: toSlotId });
    person.currentAssignedCount++;

    generateAssignments();
}
</script>
