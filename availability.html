<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Availability Analyzer</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #0284c7;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: #334155;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* NEW SIDEBAR PANEL STYLING */
        .sidebar {
            width: 320px;
            background: var(--primary);
            color: white;
            padding: 25px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
        }

        .sidebar h2 {
            margin: 0;
            font-size: 20px;
            border-bottom: 1px solid #334155;
            padding-bottom: 12px;
            color: #f8fafc;
        }

        .sidebar-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar label {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sidebar select {
            width: 100%;
            padding: 10px;
            border: 1px solid #334155;
            border-radius: 6px;
            background: #0f172a;
            color: white;
            font-size: 14px;
        }

        /* MAIN DASHBOARD CONTENT AREA */
        .main-content {
            flex: 1;
            padding: 30px;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        h1 { margin: 0; color: var(--primary); font-size: 26px; }

        .nav-btn {
            display: inline-block;
            background-color: #64748b; 
            color: white;
            text-decoration: none; 
            padding: 10px 18px;
            font-weight: 600;
            font-size: 14px;
            border-radius: 6px;
            transition: opacity 0.2s;
        }
        .nav-btn:hover { opacity: 0.9; }

        /* VIEW CONTAINER STATES */
        .results-wrapper {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            flex: 1;
        }

        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .person-card {
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .person-card strong {
            font-size: 16px;
            color: var(--primary);
        }

        .status-badge {
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            width: fit-content;
            text-transform: uppercase;
        }

        .status-badge.avail { background-color: #d1fae5; color: var(--success); }
        .status-badge.confl { background-color: #fee2e2; color: var(--danger); }

        .conflict-reason {
            font-size: 12px;
            color: #64748b;
            font-style: italic;
            margin-top: 4px;
        }

        .placeholder-text {
            text-align: center;
            padding: 80px 20px;
            color: #94a3b8;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Control Filters</h2>
    
    <div class="sidebar-group">
        <label for="analysisMode">Analysis Mode</label>
        <select id="analysisMode" onchange="switchMode()">
            <option value="slot">Filter by Church Slot</option>
            <option value="member">Analyze Individual Member</option>
        </select>
    </div>

    <div id="slotModeControls" class="sidebar-group">
        <label for="churchSlotSelect">Target Church Duty Slot</label>
        <select id="churchSlotSelect" onchange="runAnalysis()">
            <option value="">-- Choose Time Slot --</option>
        </select>
    </div>

    <div id="memberModeControls" class="sidebar-group" style="display: none;">
        <label for="memberSelect">Target Member Profile</label>
        <select id="memberSelect" onchange="runAnalysis()">
            <option value="">-- Loading Names --</option>
        </select>
    </div>
    
    <div style="font-size: 12px; color: #64748b; margin-top: auto; line-height: 1.4;">
        💡 <strong>System Rule:</strong> Travel windows are dynamically locked 1.5 hours before and after work/school profiles.
    </div>
</div>

<div class="main-content">
    <div class="header-bar">
        <h1 id="dashboardTitle">Predictive Group Availability</h1>
        <div style="display:flex; gap:8px;">
            <a href="view.html" class="nav-btn">📋 View Table</a>
        </div>
    </div>

    <div class="results-wrapper">
        <div id="dynamicOutput">
            <div class="placeholder-text">Please utilize the left control panel to execute database lookup matrices.</div>
        </div>
    </div>
</div>

<script>
// =============== ADMIN GATEKEEPER SECURITY ===============
(function checkAdminAccess() {
    const ADMIN_PASSWORD = "july27,1914"; 
    if (sessionStorage.getItem("admin_authenticated") === "true") return; 

    const userAttempt = prompt("🔒 Restricted Area: Enter password to access Analyzer:");
    if (userAttempt === ADMIN_PASSWORD) {
        sessionStorage.setItem("admin_authenticated", "true");
    } else {
        alert("❌ Access Denied.");
        window.location.href = "index.html";
    }
})();

const WORKER_URL = "https://schedule-api.jakemm04.workers.dev";
let rawDatabaseRows = [];
let organizedProfiles = {};

const CHURCH_DUTY_ROSTER = [
    { name: "Wed 5am",  day: "wednesday", start: "05:00", end: "06:30" },
    { name: "Wed 5pm",  day: "wednesday", start: "17:00", end: "18:30" },
    { name: "Wed 8pm",  day: "wednesday", start: "20:00", end: "21:30" },
    { name: "Thu 5am",  day: "thursday",  start: "05:00", end: "06:30" },
    { name: "Thu 5pm",  day: "thursday",  start: "17:00", end: "18:30" },
    { name: "Thu 8pm",  day: "thursday",  start: "20:00", end: "21:30" },
    { name: "Sat 6am",  day: "saturday",  start: "06:00", end: "07:30" },
    { name: "Sat 10am (Laan)", day: "saturday", start: "10:00", end: "12:00" },
    { name: "Sat 2pm",  day: "saturday",  start: "14:00", end: "15:30" },
    { name: "Sat 6pm",  day: "saturday",  start: "18:00", end: "19:30" },
    { name: "Sun 6am",  day: "sunday",    start: "06:00", end: "07:30" },
    { name: "Sun 10am", day: "sunday",    start: "10:00", end: "11:30" },
    { name: "Sun 2pm",  day: "sunday",    start: "14:00", end: "15:30" }
];

window.addEventListener('DOMContentLoaded', fetchRawData);

async function fetchRawData() {
    try {
        const response = await fetch(`${WORKER_URL}/api/reports`);
        if (!response.ok) throw new Error();
        rawDatabaseRows = await response.json();
        
        processProfiles();
        populateControlMenus();
    } catch {
        document.getElementById('dynamicOutput').innerHTML = '<div class="placeholder-text" style="color:red;">Failed to hook network streams.</div>';
    }
}

function processProfiles() {
    rawDatabaseRows.forEach(row => {
        if (!organizedProfiles[row.name]) {
            organizedProfiles[row.name] = { name: row.name, constraints: [] };
        }
        if (row.schedule_type === 'work' || row.schedule_type === 'school') {
            organizedProfiles[row.name].constraints.push({
                type: row.schedule_type,
                day: row.day_or_slot.toLowerCase(),
                time_in: row.time_in,
                time_out: row.time_out
            });
        }
    });
}

function populateControlMenus() {
    // Populate Church Slots Menu
    const slotSelect = document.getElementById('churchSlotSelect');
    let slotHtml = '<option value="">-- Choose Time Slot --</option>';
    CHURCH_DUTY_ROSTER.forEach((slot, index) => {
        slotHtml += `<option value="${index}">${slot.name}</option>`;
    });
    slotSelect.innerHTML = slotHtml;

    // Populate Member Menu
    const memberSelect = document.getElementById('memberSelect');
    const names = Object.keys(organizedProfiles).sort();
    let memberHtml = '<option value="">-- Choose Member --</option>';
    names.forEach(name => { memberHtml += `<option value="${name}">${name}</option>`; });
    memberSelect.innerHTML = memberHtml;
}

function switchMode() {
    const mode = document.getElementById('analysisMode').value;
    document.getElementById('slotModeControls').style.display = mode === 'slot' ? 'flex' : 'none';
    document.getElementById('memberModeControls').style.display = mode === 'member' ? 'flex' : 'none';
    
    // Clear outputs on conversion loop
    document.getElementById('churchSlotSelect').value = "";
    document.getElementById('memberSelect').value = "";
    document.getElementById('dynamicOutput').innerHTML = '<div class="placeholder-text">Select parameters inside the sidebar to process data filters.</div>';
}

function timeToMinutes(timeStr) {
    const [h, m] = timeStr.split(':').map(Number);
    return h * 60 + m;
}

function convertTo12Hour(timeStr) {
    let [h, m] = timeStr.split(':');
    let hours = parseInt(h, 10);
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    return `${hours}:${m} ${ampm}`;
}

function runAnalysis() {
    const mode = document.getElementById('analysisMode').value;
    if (mode === 'slot') {
        analyzeBySlot();
    } else {
        analyzeByMember();
    }
}

// SIDEBAR TRIGGER A: Find who can work a specific time slot
function analyzeBySlot() {
    const slotIdx = document.getElementById('churchSlotSelect').value;
    const container = document.getElementById('dynamicOutput');
    
    if (!slotIdx) {
        container.innerHTML = '<div class="placeholder-text">Select a church time slot to map group availability arrays.</div>';
        return;
    }

    const slot = CHURCH_DUTY_ROSTER[slotIdx];
    document.getElementById('dashboardTitle').innerText = `Roster Ranks: ${slot.name}`;

    const slotStartMin = timeToMinutes(slot.start);
    const slotEndMin = timeToMinutes(slot.end);

    let availableHTML = '<h3>Available Personnel</h3><div class="roster-grid">';
    let conflictHTML = '<h3 style="margin-top:30px;">Unavailable Personnel (Conflicts)</h3><div class="roster-grid">';
    
    let availCount = 0, conflictCount = 0;

    Object.values(organizedProfiles).forEach(profile => {
        let hasConflict = false;
        let reason = "";

        for (let constraint of profile.constraints) {
            if (constraint.day === slot.day) {
                const busyStart = timeToMinutes(constraint.time_in);
                const busyEnd = timeToMinutes(constraint.time_out);
                
                // 1.5 Hour safety thresholds parameters evaluation
                const bufferedStart = busyStart - 90;
                const bufferedEnd = busyEnd + 90;

                if (slotStartMin < bufferedEnd && slotEndMin > bufferedStart) {
                    hasConflict = true;
                    reason = `Busy with ${constraint.type.toUpperCase()} (${convertTo12Hour(constraint.time_in)} - ${convertTo12Hour(constraint.time_out)})`;
                    break;
                }
            }
        }

        if (!hasConflict) {
            availCount++;
            availableHTML += `
            <div class="person-card" style="border-top: 3px solid var(--success);">
                <strong>${profile.name}</strong>
                <span class="status-badge avail">✅ Free</span>
            </div>`;
        } else {
            conflictCount++;
            conflictHTML += `
            <div class="person-card" style="border-top: 3px solid var(--danger); opacity: 0.75;">
                <strong>${profile.name}</strong>
                <span class="status-badge confl">❌ Blocked</span>
                <span class="conflict-reason">${reason}</span>
            </div>`;
        }
    });

    availableHTML += availCount === 0 ? '<p style="color:#94a3b8; font-style:italic; padding-left:10px;">No members available.</p>' : '';
    conflictHTML += conflictCount === 0 ? '<p style="color:#94a3b8; font-style:italic; padding-left:10px;">No scheduling conflicts identified.</p>' : '';
    
    container.innerHTML = availableHTML + '</div>' + conflictHTML + '</div>';
}

// SIDEBAR TRIGGER B: Show everything for a single member (Original View)
function analyzeByMember() {
    const selectedName = document.getElementById('memberSelect').value;
    const container = document.getElementById('dynamicOutput');

    if (!selectedName) {
        container.innerHTML = '<div class="placeholder-text">Select a member to track target parameters.</div>';
        return;
    }

    document.getElementById('dashboardTitle').innerText = `Individual Evaluation: ${selectedName}`;
    const profile = organizedProfiles[selectedName];
    
    let gridHtml = '<div class="roster-grid">';

    CHURCH_DUTY_ROSTER.forEach(slot => {
        let hasConflict = false;
        let conflictReason = "";
        const slotStartMin = timeToMinutes(slot.start);
        const slotEndMin = timeToMinutes(slot.end);

        for (let constraint of profile.constraints) {
            if (constraint.day === slot.day) {
                const busyStart = timeToMinutes(constraint.time_in);
                const busyEnd = timeToMinutes(constraint.time_out);
                const bufferedStart = busyStart - 90; 
                const bufferedEnd = busyEnd + 90;

                if (slotStartMin < bufferedEnd && slotEndMin > bufferedStart) {
                    hasConflict = true;
                    conflictReason = `${constraint.type.toUpperCase()} (${convertTo12Hour(constraint.time_in)} - ${convertTo12Hour(constraint.time_out)})`;
                    break; 
                }
            }
        }

        if (hasConflict) {
            gridHtml += `
            <div class="person-card" style="border-left: 4px solid var(--danger); background:#fef2f2;">
                <strong>${slot.name}</strong>
                <span class="status-badge confl">❌ Conflict</span>
                <span class="conflict-reason">Overlap with ${conflictReason} (+1.5hr buffer)</span>
            </div>`;
        } else {
            gridHtml += `
            <div class="person-card" style="border-left: 4px solid var(--success); background:#f0fdf4;">
                <strong>${slot.name}</strong>
                <span class="status-badge avail">✅ Available</span>
            </div>`;
        }
    });

    container.innerHTML = '<h3>Kagawaran Suitability Matrix</h3>' + gridHtml + '</div>';
}
</script>

</body>
</html>
