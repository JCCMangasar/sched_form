<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
    
    :root {
        --primary: #1e293b;
        --accent: #0284c7;
        --success: #16a34a;
        --danger: #dc2626;
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --border: #e2e8f0;
    }

    body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background-color: var(--bg);
        margin: 0;
        padding: 0;
        color: #334155;
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    .sidebar {
        width: 320px;
        background: var(--primary);
        color: white;
        padding: 25px 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 15px;
        box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        overflow-y: auto;
        flex-shrink: 0;
    }

    .sidebar h2 { margin: 0; font-size: 18px; border-bottom: 1px solid #334155; padding-bottom: 10px; color: #f8fafc; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .sidebar label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; }
    .sidebar input, .sidebar select { padding: 8px 12px; border: 1px solid #334155; border-radius: 6px; background: #0f172a; color: white; font-size: 14px; }
    .sidebar button { background: var(--accent); color: white; border: none; padding: 10px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; }
    .sidebar button:hover { opacity: 0.9; }

    .managed-slots { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
    .slot-item { 
        background: #1e293b; 
        border: 1px solid #334155; 
        padding: 10px; 
        border-radius: 6px; 
        font-size: 13px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
    }
    .slot-actions button { background: none; border: none; color: #94a3b8; cursor: pointer; margin-left: 5px; font-size: 16px; }
    .delete-slot-btn { color: #ef4444 !important; }

    /* Main Grid View Area */
    .main-content { 
        flex: 1; 
        padding: 30px; 
        box-sizing: border-box; 
        overflow-y: auto; 
    }
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
    h1 { margin: 0; color: var(--primary); font-size: 24px; }
    .action-btn { background-color: var(--success); color: white; border: none; padding: 12px 20px; font-weight: bold; font-size: 14px; border-radius: 6px; cursor: pointer; }

    /* Persistent Right Sidebar Panel */
    .right-sidebar {
        width: 340px;
        background: #ffffff;
        border-left: 1px solid var(--border);
        box-shadow: -4px 0 10px rgba(0,0,0,0.03);
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 20px;
        overflow-y: auto;
        flex-shrink: 0;
    }
    .right-sidebar h3 { margin: 0; font-size: 15px; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 6px; }

    .location-section { margin-bottom: 35px; }
    .location-title { font-size: 18px; color: var(--primary); border-left: 4px solid var(--accent); padding-left: 10px; margin-bottom: 15px; font-weight: bold; }
    .suguan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }

    .suguan-card {
        background: var(--card-bg);
        border: 2px solid var(--border);
        border-radius: 8px;
        padding: 15px;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02);
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 140px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .suguan-card.active { border-color: var(--accent); background: #f0f9ff; box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.2); }
    .suguan-card.dragover { border-color: var(--success); background: #f0fdf4; }
    .suguan-card.invalid { border-color: var(--danger); animation: shake 0.4s; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25%,75% { transform: translateX(-6px); } }

    .delegate-pill {
        background: #f1f5f9;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        color: #334155;
        border-left: 4px solid var(--accent);
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: grab;
        user-select: none;
        margin-bottom: 6px;
    }
    .delegate-pill:active { cursor: grabbing; }
    .delegate-pill .remove-btn { color: var(--danger); font-weight: bold; cursor: pointer; margin-left: 8px; padding: 0 4px; }
    .no-delegates { color: var(--danger); font-size: 13px; font-style: italic; }

    .available-list { 
        display: flex; 
        flex-direction: column; 
        gap: 6px; 
        max-height: 280px; 
        overflow-y: auto; 
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #f8fafc;
        min-height: 80px;
    }
    .all-users-list {
        max-height: 350px;
    }

    /* Modal Styling */
    .modal {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }
    .modal-content { background: white; padding: 25px; border-radius: 8px; width: 380px; color: #334155; }
    </style>
</head>

async function fetchRawData() {
    try {
        const response = await fetch(`${WORKER_URL}/api/reports`);
        if (!response.ok) throw new Error();
        rawDatabaseRows = await response.json();
        processProfiles();
    } catch {
        alert("Unable to interface with edge worker data pipelines.");
    }
}

function processProfiles() {
    organizedProfiles = {};
    rawDatabaseRows.forEach(row => {
        if (!organizedProfiles[row.name]) {
            organizedProfiles[row.name] = { name: row.name, constraints: [], currentAssignedCount: 0, assignedIntervals: [] };
        }
        if (row.schedule_type === 'work' || row.schedule_type === 'school') {
            organizedProfiles[row.name].constraints.push({
                type: row.schedule_type,
                day: row.day_or_slot.toLowerCase(),
                time_in: row.time_in,
                time_out: row.time_out,
                isChurch: false
            });
        } else if (row.schedule_type.startsWith('church:')) {
            organizedProfiles[row.name].constraints.push({
                type: `CHURCH_DUTY`,
                day: "unknown", 
                time_in: "00:00",
                time_out: "00:00",
                isChurch: true,
                rawSlot: row.day_or_slot.toLowerCase()
            });
        }
    });
}

function renderSidebarList() {
    const container = document.getElementById('managedSlotsContainer');
    if (!container) return;
    container.innerHTML = CUSTOM_SCHEDULE_BLOCKS.map(s => `
        <div class="slot-item">
            <div>
                <strong>[${s.location}]</strong> ${s.name}<br>
                <small>${s.day.toUpperCase()} | ${s.start}-${s.end} (${s.quota} pax)</small>
            </div>
            <div class="slot-actions">
                <button onclick="editSlot(${s.id})" title="Edit">✏️</button>
                <button class="delete-slot-btn" onclick="deleteCustomSlot(${s.id})" title="Delete">×</button>
            </div>
        </div>
    `).join('');
}

function addCustomSlot() {
    const location = document.getElementById('newLocation').value;
    const day = document.getElementById('newDay').value;
    const name = document.getElementById('newLabel').value.trim();
    const start = document.getElementById('newStart').value;
    const end = document.getElementById('newEnd').value;
    const quota = parseInt(document.getElementById('newQuota').value) || 1;

    if (!name) return alert("Please enter label!");

    CUSTOM_SCHEDULE_BLOCKS.push({ id: Date.now(), location, name, day, start, end, quota });
    localStorage.setItem('custom_suguan_schedule', JSON.stringify(CUSTOM_SCHEDULE_BLOCKS));
    renderSidebarList();
    document.getElementById('newLabel').value = "";
}

function deleteCustomSlot(id) {
    if (!confirm("Delete this slot?")) return;
    CUSTOM_SCHEDULE_BLOCKS = CUSTOM_SCHEDULE_BLOCKS.filter(s => s.id !== id);
    localStorage.setItem('custom_suguan_schedule', JSON.stringify(CUSTOM_SCHEDULE_BLOCKS));
    renderSidebarList();
    generateAssignments(true);
}

let currentEditId = null;

    const slot = CUSTOM_SCHEDULE_BLOCKS.find(s => s.id === id);

    currentEditId = id;

    document.getElementById('editLabel').value = slot.name;

    document.getElementById('editEnd').value = slot.end;

    document.getElementById('editModal').style.display = 'flex';

function saveEdit() {
    const id = parseInt(document.getElementById('editId').value);

    if (!slot) return;

    slot.location = document.getElementById('editLocation').value;

    slot.day = document.getElementById('editDay').value;

    renderSidebarList();

function closeModal() {
    document.getElementById('editModal').style.display = 'none';

function timeToMinutes(timeStr) {
    const [h, m] = timeStr.split(':').map(Number);
    return h * 60 + m;
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function intervalsOverlap(start1, end1, start2, end2) {
    return start1 < end2 && start2 < end1;
}

// Generate Matrix Block
function generateAssignments(forceFreshRebuild = false) {
    const isFrozen = document.getElementById('freezeToggle')?.checked;
    
    // Prevent system wipe when user freezes modifications
    if (isFrozen && forceFreshRebuild) {
        alert("⚠️ Manual mode is frozen. Uncheck 'Freeze / Manual Mode' to auto-generate.");
        return;
    }

    if (forceFreshRebuild || Object.values(organizedProfiles).every(p => p.assignedIntervals.length === 0)) {
        Object.values(organizedProfiles).forEach(p => {
            p.currentAssignedCount = 0;
            p.assignedIntervals = [];
        });

        // Track locking variables for both linked groups separately
        let lockedDeGuzmanPerson = null;
        let lockedLajadaPerson = null;

        CUSTOM_SCHEDULE_BLOCKS.forEach(slot => {
            let assignedDelegates = [];
            
            // Apply Group Locking Rules
            if (slot.linkedGroup === "deguzman" && lockedDeGuzmanPerson) {
                assignedDelegates = [lockedDeGuzmanPerson];
            } else if (slot.linkedGroup === "lajada" && lockedLajadaPerson) {
                assignedDelegates = [lockedLajadaPerson];
            } else {
                const slotStartMin = timeToMinutes(slot.start);
                const slotEndMin = timeToMinutes(slot.end);
                const slotStartWithPrepBuffer = slotStartMin - 105;

                let eligibleCandidates = Object.values(organizedProfiles).filter(p => {
                    let hasConflict = false;
                    for (let c of p.constraints) {
                        if (!c.isChurch && c.day === slot.day) {
                            const workStart = timeToMinutes(c.time_in);
                            const workEnd = timeToMinutes(c.time_out) + 90;
                            if (slotStartWithPrepBuffer < workEnd && slotEndMin > workStart) hasConflict = true;
                        }
                        if (c.isChurch && c.rawSlot === slot.name.toLowerCase()) hasConflict = true;
                    }
                    if (hasConflict) return false;

                    for (let iv of p.assignedIntervals) {
                        if (intervalsOverlap(slotStartMin, slotEndMin, iv.start, iv.end)) return false;
                    }
                    return true;
                });

                eligibleCandidates = shuffleArray(eligibleCandidates);
                eligibleCandidates.sort((a, b) => a.currentAssignedCount - b.currentAssignedCount);
                assignedDelegates = eligibleCandidates.slice(0, slot.quota);

                // Save assignments into locking variables when the first linked item encounters a person
                if (slot.linkedGroup === "deguzman" && assignedDelegates.length) lockedDeGuzmanPerson = assignedDelegates[0];
                if (slot.linkedGroup === "lajada" && assignedDelegates.length) lockedLajadaPerson = assignedDelegates[0];
            }

            assignedDelegates.forEach(d => {
                d.currentAssignedCount++;
                d.assignedIntervals.push({ start: timeToMinutes(slot.start), end: timeToMinutes(slot.end), slotId: slot.id });
            });
        });
    }

    renderMatrixGrid();
}

function renderMatrixGrid() {
    let htmlOutput = "";
    const groupedByLocation = CUSTOM_SCHEDULE_BLOCKS.reduce((acc, slot) => {
        if (!acc[slot.location]) acc[slot.location] = [];
        acc[slot.location].push(slot);
        return acc;
    }, {});

    for (const [location, slots] of Object.entries(groupedByLocation)) {
        htmlOutput += `<div class="location-section"><div class="location-title">${location} Division</div><div class="suguan-grid">`;

        slots.forEach(slot => {
            let assignedDelegates = Object.values(organizedProfiles).filter(p => 
                p.assignedIntervals.some(iv => iv.slotId === slot.id)
            );

            let delegatesHtml = assignedDelegates.map(d => `
                <div class="delegate-pill" draggable="true" 
                     ondragstart="dragStart(event, '${d.name}', ${slot.id})"
                     ondrop="dropOnPerson(event, '${d.name}', ${slot.id})"
                     ondragover="allowDrop(event)">
                    👤 ${d.name} <span style="font-size:10px; opacity:0.6;">#${d.currentAssignedCount}</span>
                    <span class="remove-btn" onclick="removeDelegate('${d.name}', ${slot.id}); event.stopImmediatePropagation();">×</span>
                </div>
            `).join('');

            htmlOutput += `
                <div class="suguan-card ${selectedSlotId === slot.id ? 'active' : ''}" data-slot-id="${slot.id}" 
                     ondrop="dropOnCard(event, ${slot.id})" 
                     ondragover="allowDrop(event)" 
                     ondragleave="dragLeave(event)"
                     onclick="selectSlot(${slot.id})">
                    <div class="time">📍 ${slot.name}</div>
                    <div style="font-size:11px; color:#64748b;">Quota: ${slot.quota}</div>
                    ${delegatesHtml || '<span class="no-delegates">No delegates assigned</span>'}
                </div>
            `;
        });

        htmlOutput += `</div></div>`;
    }

    document.getElementById('suguanContainer').innerHTML = htmlOutput;
    
    // Always keep the master directory list rendered
    renderAllDelegatesDirectory();

    // Dynamically manage filtering states for the context sidebar
    if (selectedSlotId) {
        filterAvailableForSlot(selectedSlotId);
    } else {
        const availContainer = document.getElementById('availableDelegates');
        if (availContainer) {
            availContainer.innerHTML = '<span class="no-delegates" style="padding:10px; display:block;">Select a time slot card to view available personnel</span>';
        }
    }
}

// Renders global directory list for total overrides
function renderAllDelegatesDirectory() {
    const container = document.getElementById('allDelegatesDirectory');
    if (!container) return;
    
    const sortedProfiles = Object.values(organizedProfiles).sort((a, b) => a.name.localeCompare(b.name));
    
    container.innerHTML = sortedProfiles.map(p => `
        <div class="delegate-pill" style="border-left-color: #64748b;" draggable="true" ondragstart="dragStartFromSidebar(event, '${p.name}')">
            👤 ${p.name} <span style="font-size:10px; opacity:0.6;">#${p.currentAssignedCount}</span>
        </div>
    `).join('');
}

function renderAvailableDelegates() {
    if (selectedSlotId) {
        filterAvailableForSlot(selectedSlotId);
    } else {
        renderAllDelegatesDirectory();
    }
}

function dragStart(e, personName, fromSlotId) {
    e.dataTransfer.setData("personName", personName);
    e.dataTransfer.setData("fromSlotId", fromSlotId);
}

function dragStartFromSidebar(e, personName) {
    e.dataTransfer.setData("personName", personName);
    e.dataTransfer.setData("fromSidebar", "true");
}

function allowDrop(e) { 
    e.preventDefault(); 
    if (e.currentTarget.classList.contains('suguan-card')) {
        e.currentTarget.classList.add('dragover');
    }
}

function dragLeave(e) { 
    e.currentTarget.classList.remove('dragover'); 
}

// Standard Drop Handler (Drop onto Slot Base Container)
function dropOnCard(e, toSlotId) {
    e.preventDefault();
    e.currentTarget.classList.remove('dragover');
    const personName = e.dataTransfer.getData("personName");
    const fromSidebar = e.dataTransfer.getData("fromSidebar") === "true";
    const fromSlotId = fromSidebar ? null : parseInt(e.dataTransfer.getData("fromSlotId"));

    if (fromSlotId === toSlotId) return;

    executeAssignmentMove(personName, fromSlotId, toSlotId, false, null);
}

// Swapping Engine Drop Handler (Drop directly onto active Person Badge)
function dropOnPerson(e, targetPersonName, toSlotId) {
    e.preventDefault();
    e.stopPropagation(); 
    
    const movingPersonName = e.dataTransfer.getData("personName");
    const fromSidebar = e.dataTransfer.getData("fromSidebar") === "true";
    const fromSlotId = fromSidebar ? null : parseInt(e.dataTransfer.getData("fromSlotId"));

    if (movingPersonName === targetPersonName) return;

    if (fromSidebar) {
        // Direct Ejection/Replacement Override
        executeAssignmentMove(movingPersonName, null, toSlotId, false, targetPersonName);
    } else {
        // Structural shift exchange swap between two users
        executeAssignmentMove(movingPersonName, fromSlotId, toSlotId, true, targetPersonName);
    }
}

// Global Validation Engine and Assignment Updates Manager
function executeAssignmentMove(movingPersonName, fromSlotId, toSlotId, isASwap = false, targetPersonName = null) {
    const person = organizedProfiles[movingPersonName];
    const targetSlot = CUSTOM_SCHEDULE_BLOCKS.find(s => s.id === toSlotId);
    const sourceSlot = fromSlotId ? CUSTOM_SCHEDULE_BLOCKS.find(s => s.id === fromSlotId) : null;

    if (!person || !targetSlot) return;

    const newStart = timeToMinutes(targetSlot.start);
    const newEnd = timeToMinutes(targetSlot.end);

    let warnings = [];

    // Division change exception checking
    let isSameTimeDivisionMove = false;
    if (sourceSlot) {
        isSameTimeDivisionMove = sourceSlot.day === targetSlot.day && 
                                 sourceSlot.start === targetSlot.start && 
                                 sourceSlot.end === targetSlot.end && 
                                 sourceSlot.location !== targetSlot.location;
    }

    // A: External Schedule Checks (Work/School/Church limits)
    for (let c of person.constraints) {
        if (!c.isChurch && c.day === targetSlot.day) {
            const workStart = timeToMinutes(c.time_in);
            const workEnd = timeToMinutes(c.time_out) + 90;
            if ((newStart - 105) < workEnd && newEnd > workStart) {
                warnings.push(`• Work/School overlapping window limits on ${targetSlot.day.toUpperCase()}`);
            }
        }
        if (c.isChurch && c.rawSlot === targetSlot.name.toLowerCase()) {
            warnings.push(`• Dedicated duty override restriction found for ${targetSlot.name}`);
        }
    }

    // B: Internal Timeline Checks
    let hasTimeOverlap = false;
    for (let iv of person.assignedIntervals) {
        if (iv.slotId !== fromSlotId && intervalsOverlap(newStart, newEnd, iv.start, iv.end)) {
            hasTimeOverlap = true;
        }
    }
    if (hasTimeOverlap && !isSameTimeDivisionMove) {
        warnings.push(`• Exact timeline intersection collision with another active assignment`);
    }

    // C: Double / Straight Duty Verification (Same Day Verification)
    let assignedOnSameDay = person.assignedIntervals.some(iv => {
        if (iv.slotId === fromSlotId) return false;
        const sBlock = CUSTOM_SCHEDULE_BLOCKS.find(s => s.id === iv.slotId);
        return sBlock && sBlock.day === targetSlot.day;
    });

    if (assignedOnSameDay) {
        warnings.push(`• Double/Straight consecutive assignment discovered for ${targetSlot.day.toUpperCase()}`);
    }

    // Interactive Confirmation Alert Step
    if (warnings.length > 0) {
        const cardNode = document.querySelector(`[data-slot-id="${toSlotId}"]`);
        if (cardNode) {
            cardNode.classList.add('invalid');
            setTimeout(() => cardNode.classList.remove('invalid'), 800);
        }

        const msg = `⚠️ Schedule Alert for ${movingPersonName}:\n${warnings.join('\n')}\n\nDo you want to proceed anyway and update this person's assignment?`;
        if (!confirm(msg)) return; 
    }

    // Execute Swap or Replacement Handling Logic
    if (isASwap && targetPersonName && sourceSlot) {
        const targetPerson = organizedProfiles[targetPersonName];
        
        // Remove target person from destination slot
        targetPerson.assignedIntervals = targetPerson.assignedIntervals.filter(iv => iv.slotId !== toSlotId);
        
        // Put target person into moving person's original slot
        targetPerson.assignedIntervals.push({
            start: timeToMinutes(sourceSlot.start),
            end: timeToMinutes(sourceSlot.end),
            slotId: fromSlotId
        });
    } else if (targetPersonName && !isASwap) {
        // Direct Ejection Override
        const targetPerson = organizedProfiles[targetPersonName];
        targetPerson.assignedIntervals = targetPerson.assignedIntervals.filter(iv => iv.slotId !== toSlotId);
    }

    // Save changes for the moving person
    if (fromSlotId !== null) {
        person.assignedIntervals = person.assignedIntervals.filter(iv => iv.slotId !== fromSlotId);
    }
    person.assignedIntervals.push({ start: newStart, end: newEnd, slotId: toSlotId });

    // Global counts refresh sync step
    Object.values(organizedProfiles).forEach(p => {
        p.currentAssignedCount = p.assignedIntervals.length;
    });

    renderMatrixGrid();
}

function removeDelegate(personName, slotId) {
    const person = organizedProfiles[personName];
    if (!person) return;

    person.assignedIntervals = person.assignedIntervals.filter(iv => iv.slotId !== slotId);
    person.currentAssignedCount = person.assignedIntervals.length;

    renderMatrixGrid();
}

function selectSlot(slotId) {
    selectedSlotId = slotId;
    document.querySelectorAll('.suguan-card').forEach(card => card.classList.remove('active'));
    
    const activeCard = document.querySelector(`.suguan-card[data-slot-id="${slotId}"]`);
    if (activeCard) activeCard.classList.add('active');

    filterAvailableForSlot(slotId);
}

function filterAvailableForSlot(slotId) {
    const slot = CUSTOM_SCHEDULE_BLOCKS.find(s => s.id === slotId);
    if (!slot) return;

    const container = document.getElementById('availableDelegates');
    if (!container) return;
    
    const slotStartMin = timeToMinutes(slot.start);
    const slotEndMin = timeToMinutes(slot.end);

    const eligible = Object.values(organizedProfiles).filter(p => {
        let hasConflict = false;

        for (let c of p.constraints) {
            if (!c.isChurch && c.day === slot.day) {
                const workStart = timeToMinutes(c.time_in);
                const workEnd = timeToMinutes(c.time_out) + 90;
                if (slotStartMin - 105 < workEnd && slotEndMin > workStart) hasConflict = true;
            }
            if (c.isChurch && c.rawSlot === slot.name.toLowerCase()) hasConflict = true;
        }
        if (hasConflict) return false;

        for (let iv of p.assignedIntervals) {
            if (iv.slotId !== slotId && intervalsOverlap(slotStartMin, slotEndMin, iv.start, iv.end)) return false;
        }
        return true;
    });

    if (eligible.length === 0) {
        container.innerHTML = '<span class="no-delegates" style="padding:10px; display:block;">No fully free profiles for this slot time frame</span>';
    } else {
        container.innerHTML = eligible.map(p => `
            <div class="delegate-pill" draggable="true" ondragstart="dragStartFromSidebar(event, '${p.name}')">
                👤 ${p.name} <span style="font-size:10px; opacity:0.6;">#${p.currentAssignedCount}</span>
            </div>
        `).join('');
    }
}

window.addEventListener('DOMContentLoaded', () => {
    populateNameDropdownSelection();
});

async function populateNameDropdownSelection() {
    const WORKER_URL = "https://schedule-api.jakemm04.workers.dev";
    const dropdownElement = document.getElementById('nameInput'); // Match this ID with your form's name input element
    
    if (!dropdownElement) return;

    try {
        // Fetch the official list of registered profiles from the server
        const response = await fetch(`${WORKER_URL}/api/profiles`);
        if (!response.ok) return;
        
        const registeredMembers = await response.json();
        
        // Convert the input box into a clean, selectable list of names
        let optionsHtml = `<option value="" disabled selected>-- Piliin ang Iyong Pangalan --</option>`;
        
        registeredMembers.forEach(member => {
            if (member.status === 'Active') {
                optionsHtml += `<option value="${member.name}">${member.name} (${member.gampanin})</option>`;
            }
        });
        
        dropdownElement.innerHTML = optionsHtml;
    } catch (err) {
        console.error("Could not load names into dropdown menu selection:", err);
    }
}
